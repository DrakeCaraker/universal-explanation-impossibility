name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean-build:
    name: Lean 4 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1

  verify-counts:
    name: Verify Theorem/Axiom Counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check counts
        run: |
          THEOREMS=$(grep -c '^theorem\|^lemma' UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          AXIOMS=$(grep -c '^axiom' UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          # Count actual sorry tactics (not the word "sorry" in comments)
          SORRY=$(grep -c "^  sorry\|^    sorry\| sorry$" UniversalImpossibility/*.lean 2>/dev/null | awk -F: '{s+=$2} END {print s}')
          FILES=$(ls UniversalImpossibility/*.lean | wc -l | tr -d ' ')

          echo "Theorems+lemmas: $THEOREMS"
          echo "Axioms:          $AXIOMS"
          echo "Sorry:           $SORRY"
          echo "Files:           $FILES"

          if [ "$SORRY" -gt 0 ]; then
            echo "::error::$SORRY sorry found in Lean files"
            grep -rn "^  sorry\|^    sorry\| sorry$" UniversalImpossibility/*.lean
            exit 1
          fi

          echo "Expected: 100 files, 488 theorems, 47 axioms, 0 sorry"
