name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean-build:
    name: Lean 4 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1

  verify-counts:
    name: Verify Theorem/Axiom Counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check counts
        run: |
          THEOREMS=$(grep -c '^theorem\|^lemma' UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          AXIOMS=$(grep -c '^axiom' UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          SORRY=$(grep -rc 'sorry' UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          FILES=$(ls UniversalImpossibility/*.lean | wc -l | tr -d ' ')

          echo "Theorems+lemmas: $THEOREMS"
          echo "Axioms:          $AXIOMS"
          echo "Sorry:           $SORRY"
          echo "Files:           $FILES"

          if [ "$SORRY" -gt 0 ]; then
            echo "::error::$SORRY sorry found in Lean files"
            grep -rn 'sorry' UniversalImpossibility/*.lean
            exit 1
          fi

          echo "Expected: 75 files, 351 theorems, 72 axioms, 0 sorry"
