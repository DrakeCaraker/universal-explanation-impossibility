name: Validate
on: [push, pull_request]

jobs:
  lean-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Lean
        run: lake build
        timeout-minutes: 30

  verify-counts:
    runs-on: ubuntu-latest
    needs: lean-build
    steps:
      - uses: actions/checkout@v4
      - name: Verify theorem counts
        run: |
          FILES=$(ls UniversalImpossibility/*.lean | wc -l | tr -d ' ')
          THEOREMS=$(grep -c "^theorem\|^lemma" UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          AXIOMS=$(grep -c "^axiom" UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          # Count actual sorry tactics (not the word "sorry" in comments)
          SORRY=$(grep -c "^  sorry\|^    sorry\| sorry$" UniversalImpossibility/*.lean 2>/dev/null | awk -F: '{s+=$2} END {print s}')
          echo "Files: $FILES, Theorems: $THEOREMS, Axioms: $AXIOMS, Sorry: $SORRY"
          [ "$FILES" -eq 102 ] || (echo "FAIL: expected 102 files, got $FILES" && exit 1)
          [ "$SORRY" -eq 0 ] || (echo "FAIL: found $SORRY sorry statements" && exit 1)

  python-experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install numpy scipy scikit-learn matplotlib xgboost
      - name: Run validation experiments
        run: |
          cd paper/scripts
          python run_all_universal_experiments.py
        timeout-minutes: 15
