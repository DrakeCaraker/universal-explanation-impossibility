name: Validate
on: [push, pull_request, workflow_dispatch]

jobs:
  verify-counts:
    name: Verify Theorem/Axiom Counts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify theorem counts
        run: |
          FILES=$(ls UniversalImpossibility/*.lean | wc -l | tr -d ' ')
          THEOREMS=$(grep -c "^theorem\|^lemma" UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          AXIOMS=$(grep -c "^axiom" UniversalImpossibility/*.lean | awk -F: '{s+=$2} END {print s}')
          # Count actual sorry tactics (not the word "sorry" in comments)
          SORRY=$(grep -c "^  sorry\|^    sorry\| sorry$" UniversalImpossibility/*.lean 2>/dev/null | awk -F: '{s+=$2} END {print s}')
          echo "Files: $FILES, Theorems: $THEOREMS, Axioms: $AXIOMS, Sorry: $SORRY"
          echo "Expected: 103 files, 455 theorems, 72 axioms, 0 sorry"
          [ "$FILES" -eq 103 ] || (echo "FAIL: expected 103 files, got $FILES" && exit 1)
          [ "$THEOREMS" -eq 455 ] || (echo "FAIL: expected 455 theorems, got $THEOREMS" && exit 1)
          [ "$AXIOMS" -eq 72 ] || (echo "FAIL: expected 72 axioms, got $AXIOMS" && exit 1)
          [ "$SORRY" -eq 0 ] || (echo "FAIL: found $SORRY sorry statements" && exit 1)
          echo "All counts verified."

  # Lean build is handled by lean_action_ci.yml (uses leanprover/lean-action with caching).
  # Python experiments disabled — require torch/transformers/GPU. Run locally: make validate
