# Alfred project configuration
# Hooks and commands read this instead of hardcoding values.

project:
  name: "universal-explanation-impossibility"
  type: "mixed"

formatting:
  tool: "none"

testing:
  command: "lake build"
  fast_command: "lake build"

ci:
  lint_command: "lake build"
  typecheck_command: "lake build"
  source_paths: ["UniversalImpossibility/"]
  source_glob: "*.lean"

protected_files: ["UniversalImpossibility/ExplanationSystem.lean"]

blocked_extensions: [".olean", ".ilean", ".trace", ".pkl", ".pt", ".h5"]
max_file_size_mb: 10

git:
  main_branch: "main"

domain:
  venue: "Nature (primary) / JMLR (backup) / NeurIPS 2026 (companion attribution paper)"
  topic: "Universal explanation impossibility theorem — Lean 4 formalization, 8 cross-domain derivations, G-invariant resolution, group-theoretic classification"
